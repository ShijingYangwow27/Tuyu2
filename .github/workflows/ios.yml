name: iOS Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test (iOS 16 Simulator)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: |
          echo "=== /Applications: ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "no Xcode*.app"
          echo "=== Current default: ==="
          xcode-select -p
          xcodebuild -version 2>&1 || true

      - name: Select Xcode 15.x
        run: |
          # 优先 15.4，回退 15.3 / 15.2 / 15.0，最后用默认
          for v in 15.4 15.3 15.2 15.1 15.0; do
            if [ -d "/Applications/Xcode_${v}.app" ]; then
              sudo xcode-select -s "/Applications/Xcode_${v}.app/Contents/Developer"
              echo "Selected Xcode ${v}"
              xcodebuild -version
              exit 0
            fi
          done
          echo "No Xcode 15.x found, using default"
          xcodebuild -version

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list devices available | head -30

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme Tuyu

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -scheme Tuyu \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log | grep -E "(error:|warning:|note:)" | head -50
          echo "=== exit code: ${PIPESTATUS[0]} ==="
          exit ${PIPESTATUS[0]}

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -scheme Tuyu \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee test.log | grep -E "(error:|Test Case|Executed)" | head -50
          echo "=== exit code: ${PIPESTATUS[0]} ==="
          exit ${PIPESTATUS[0]}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Tuyu-logs
          path: |
            build.log
            test.log
          if-no-files-found: ignore

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Tuyu-app
          path: build/Build/Products/Debug-iphonesimulator/Tuyu.app
          if-no-files-found: ignore
