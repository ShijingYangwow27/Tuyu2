name: iOS Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test (iOS 16 Simulator)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme Tuyu

      - name: Build
        run: |
          xcodebuild \
            -scheme Tuyu \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            build

      - name: Test
        run: |
          xcodebuild \
            -scheme Tuyu \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            test

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Tuyu-app
          path: build/Build/Products/Debug-iphonesimulator/Tuyu.app
          if-no-files-found: ignore
